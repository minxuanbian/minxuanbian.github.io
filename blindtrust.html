<!DOCTYPE html>
<html>
<head>
  <title>Blind Trust</title>

  <style>
    body {
      background: #5e616d;
      color: white;
      font-family: Helvetica, Arial, sans-serif;
      margin: 60px;
      line-height: 1.7;
      overflow: hidden;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    h3 {
      color: #ddd;
      font-weight: normal;
      margin-bottom: 30px;
    }

    p {
      max-width: 720px;
      color: #eee;
      margin-bottom: 20px;
    }

    a {
      color: white;
      text-decoration: none;
    }

    /* 🌕 圆 */
    .circle {
      position: fixed;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.5);
      pointer-events: none;
      animation: expand 4s linear forwards;
    }

    @keyframes expand {
      from {
        width: 0;
        height: 0;
        opacity: 0.8;
      }
      to {
        width: 600px;
        height: 600px;
        opacity: 0;
      }
    }

  </style>
</head>

<body>

  <h1>Blind Trust</h1>
  <h3>Project in Development</h3>

  <p>
    This project explores the unstable boundary between perception and belief — how trust is formed, misplaced, or imagined in the absence of certainty.

  <script>
    function createCircle() {
      const circle = document.createElement("div");
      circle.classList.add("circle");

      let x, y;

      const zone = Math.random();

      if (zone < 0.6) {
        // ⭐ 60% 概率：中间偏左（引导阅读区）
        x = Math.random() * window.innerWidth * 0.6;
        y = Math.random() * window.innerHeight * 0.7;
      } else if (zone < 0.85) {
        // ⭐ 25%：中间区域
        x = Math.random() * window.innerWidth * 0.8;
        y = Math.random() * window.innerHeight * 0.8;
      } else {
        // ⭐ 15%：边缘（保留空间感）
        x = Math.random() * window.innerWidth;
        y = Math.random() * window.innerHeight;
      }

      circle.style.left = x + "px";
      circle.style.top = y + "px";

      document.body.appendChild(circle);

      setTimeout(() => {
        circle.remove();
      }, 4000);
    }

    setInterval(() => {
      createCircle();
    }, 4500);
  </script>

</body>
</html>
